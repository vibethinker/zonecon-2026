name: Deploy to Cloud Run

on:
  push:
    branches: [main]          # Deploy automatically on every push to main
  workflow_dispatch:          # Also allow manual trigger from GitHub UI

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: zonecon-2026
  REGION: asia-south1         # Mumbai — change if needed
  REGISTRY: asia-south1-docker.pkg.dev
  REPO: cloud-run-apps
  IMAGE: zonecon-2026

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write         # Needed for Workload Identity Federation

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Alternatively use Workload Identity Federation (keyless) — see README

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 4. Ensure Artifact Registry repo exists (creates it on first run) ───
      - name: Create Artifact Registry repository (if needed)
        run: |
          gcloud artifacts repositories describe ${{ env.REPO }} \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} --quiet 2>/dev/null \
          || gcloud artifacts repositories create ${{ env.REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Cloud Run container images" \
            --project=${{ env.PROJECT_ID }} \
            --quiet
          echo "✅ Artifact Registry repo ready"

      # ── 5. Configure Docker to push to Artifact Registry ─────────────────
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build & push image ─────────────────────────────────────────────
      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
          docker build \
            --platform linux/amd64 \
            -t "${IMAGE_URI}:${{ github.sha }}" \
            -t "${IMAGE_URI}:latest" \
            .
          docker push "${IMAGE_URI}:${{ github.sha }}"
          docker push "${IMAGE_URI}:latest"
          echo "IMAGE_URI=${IMAGE_URI}:${{ github.sha }}" >> $GITHUB_ENV

      # ── 6. Deploy to Cloud Run ────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.IMAGE_URI }}" \
            --platform=managed \
            --region=${{ env.REGION }} \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,PORT=8080" \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      # ── 7. Print the live URL ─────────────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "🌐 Live URL: ${URL}"
          echo "### 🚀 Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      # ── 8. Delete old image versions (keep only latest) ───────────────────
      - name: Clean up old images from Artifact Registry
        # Runs even if previous steps fail so storage never bloats
        if: always()
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
          CURRENT_SHA="${{ github.sha }}"

          echo "Listing all image digests in Artifact Registry..."
          # Get all digests for this image
          ALL_DIGESTS=$(gcloud artifacts docker images list "${BASE}" \
            --include-tags \
            --format="get(digest)" \
            --project=${{ env.PROJECT_ID }} 2>/dev/null | sort -u)

          if [[ -z "$ALL_DIGESTS" ]]; then
            echo "No images found — nothing to clean."
            exit 0
          fi

          # Get the digest of the image we just pushed (the one tagged :latest)
          CURRENT_DIGEST=$(gcloud artifacts docker images describe \
            "${BASE}:latest" \
            --format="get(image_summary.digest)" \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || true)

          DELETED=0
          for DIGEST in $ALL_DIGESTS; do
            if [[ "$DIGEST" == "$CURRENT_DIGEST" ]]; then
              echo "Keeping current image: ${DIGEST}"
              continue
            fi
            echo "Deleting old image: ${DIGEST}"
            gcloud artifacts docker images delete \
              "${BASE}@${DIGEST}" \
              --delete-tags \
              --quiet \
              --project=${{ env.PROJECT_ID }} 2>/dev/null && DELETED=$((DELETED + 1)) || true
          done

          echo "✅ Cleaned up ${DELETED} old image version(s)."
          echo "### 🗑️ Cleanup: removed ${DELETED} old image(s)" >> $GITHUB_STEP_SUMMARY
